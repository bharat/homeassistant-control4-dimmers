set_device_config:
  name: Set Device Config
  description: >
    Apply a full device configuration in one call. Identify the device
    with either a single entity_id (the device's sensor anchor or any of
    its button event entities) or its ieee_address (provide exactly one).
    Any field you omit is left unchanged. When `slots` is provided it
    replaces the device's entire slot list, so include every slot you
    want to keep. Intended for scripting per-device setup (for example,
    migrating many devices onto Zigbee2MQTT). Returns the resulting
    stored config.
  fields:
    entity_id:
      name: Device Entity
      description: >
        Any entity belonging to the device (its sensor anchor or a button
        event entity). Provide this or ieee_address, not both.
      required: false
      selector:
        entity:
          integration: control4_dimmers
    ieee_address:
      name: IEEE Address
      description: >
        The device's Zigbee IEEE address (e.g. "0x000fff0000aaa001").
        Provide this or entity_id, not both.
      required: false
      selector:
        text:
    device_type_override:
      name: Device Type Override
      description: Force the device type (dimmer, keypaddim, or keypad).
      required: false
      selector:
        select:
          options:
            - "dimmer"
            - "keypaddim"
            - "keypad"
    faceplate_color:
      name: Faceplate Color
      description: Hex RGB faceplate color (e.g. "#ffffff" or "ffffff").
      required: false
      selector:
        text:
    slots:
      name: Slots
      description: >
        A list of slot configuration objects that REPLACES the device's
        full slot list. Each slot is an object with: slot_id (required,
        positive int, must be legal for the device type), size, name,
        behavior (keypad, load_on, load_off, toggle_load), led_mode
        (fixed, follow_load, push_release), led_on_color / led_off_color
        (6-digit hex, optional leading #), tap_action / double_tap_action
        / hold_action (an HA action mapping with an action/service key, or
        the "__self_load__" sentinel, or null), and led_track_entity_id.
        Example slot: {"slot_id": 1, "name": "Lights", "behavior":
        "keypad", "led_mode": "fixed", "led_off_color": "ffffff"}.
      required: false
      selector:
        object:

set_slot:
  name: Set Slot
  description: >
    Set or replace a single slot's config without resending every slot.
    Identify the device with either entity_id or ieee_address (exactly
    one). Omitted slot fields default from the existing slot if present,
    otherwise from the built-in defaults. If no slot with that slot_id
    exists yet it is created. Returns the resulting stored config.
  fields:
    entity_id:
      name: Device Entity
      description: >
        Any entity belonging to the device. Provide this or ieee_address,
        not both.
      required: false
      selector:
        entity:
          integration: control4_dimmers
    ieee_address:
      name: IEEE Address
      description: >
        The device's Zigbee IEEE address. Provide this or entity_id, not
        both.
      required: false
      selector:
        text:
    slot_id:
      name: Slot ID
      description: >
        The slot to set (positive int, must be legal for the device
        type).
      required: true
      selector:
        number:
          min: 1
          max: 6
          mode: box
    size:
      name: Size
      description: The slot's visual size in the chassis editor.
      required: false
      selector:
        number:
          min: 1
          max: 6
          mode: box
    name:
      name: Name
      description: Display name for the slot.
      required: false
      selector:
        text:
    behavior:
      name: Behavior
      description: One of keypad, load_on, load_off, toggle_load.
      required: false
      selector:
        select:
          options:
            - "keypad"
            - "load_on"
            - "load_off"
            - "toggle_load"
    led_mode:
      name: LED Mode
      description: One of fixed, follow_load, push_release.
      required: false
      selector:
        select:
          options:
            - "fixed"
            - "follow_load"
            - "push_release"
    led_on_color:
      name: LED On Color
      description: Hex RGB (e.g. "#ff0000" or "ff0000").
      required: false
      selector:
        text:
    led_off_color:
      name: LED Off Color
      description: Hex RGB (e.g. "#000000" or "000000").
      required: false
      selector:
        text:
    tap_action:
      name: Tap Action
      description: >
        An HA action mapping (an object carrying an action/service key,
        with optional target and data), or the "__self_load__" sentinel,
        or null. Example: {"action": "light.toggle", "target":
        {"entity_id": "light.kitchen"}}.
      required: false
      selector:
        object:
    double_tap_action:
      name: Double Tap Action
      description: >
        Same shape as tap_action. An HA action mapping, "__self_load__",
        or null.
      required: false
      selector:
        object:
    hold_action:
      name: Hold Action
      description: >
        Same shape as tap_action. An HA action mapping, "__self_load__",
        or null.
      required: false
      selector:
        object:
    led_track_entity_id:
      name: LED Track Entity
      description: >
        Entity whose on/off state drives this slot's LED, or null.
      required: false
      selector:
        text:

push_config:
  name: Push Config
  description: >
    Re-push a device's stored config to firmware and re-run LED
    tracking, without changing anything in the store. Use this to
    resync a device whose firmware drifted from the stored config.
    Identify the device with either entity_id or ieee_address (exactly
    one).
  fields:
    entity_id:
      name: Device Entity
      description: >
        Any entity belonging to the device. Provide this or ieee_address,
        not both.
      required: false
      selector:
        entity:
          integration: control4_dimmers
    ieee_address:
      name: IEEE Address
      description: >
        The device's Zigbee IEEE address. Provide this or entity_id, not
        both.
      required: false
      selector:
        text:

snapshot:
  name: Snapshot Device Config
  description: >
    Save the device's current stored config under a name so you can
    restore it later. Use this to take a reversible checkpoint before
    temporarily overriding LEDs or slots (for example, a Goodnight
    routine that darkens keypads). Identify the device with either
    entity_id or ieee_address (exactly one). Fails if the device has no
    stored config yet. Returns the captured config.
  fields:
    entity_id:
      name: Device Entity
      description: >
        Any entity belonging to the device. Provide this or ieee_address,
        not both.
      required: false
      selector:
        entity:
          integration: control4_dimmers
    ieee_address:
      name: IEEE Address
      description: >
        The device's Zigbee IEEE address. Provide this or entity_id, not
        both.
      required: false
      selector:
        text:
    name:
      name: Snapshot Name
      description: A label for the snapshot (reused to restore or delete it).
      required: true
      selector:
        text:

restore:
  name: Restore Device Config
  description: >
    Re-apply a previously saved snapshot, persisting it and pushing it
    to firmware just like push_config. Identify the device with either
    entity_id or ieee_address (exactly one). Fails if no snapshot with
    that name exists. Returns the resulting stored config.
  fields:
    entity_id:
      name: Device Entity
      description: >
        Any entity belonging to the device. Provide this or ieee_address,
        not both.
      required: false
      selector:
        entity:
          integration: control4_dimmers
    ieee_address:
      name: IEEE Address
      description: >
        The device's Zigbee IEEE address. Provide this or entity_id, not
        both.
      required: false
      selector:
        text:
    name:
      name: Snapshot Name
      description: The name of the snapshot to restore.
      required: true
      selector:
        text:
    delete:
      name: Delete After Restore
      description: >
        When on, the snapshot is removed after a successful restore. Use
        this for one-shot checkpoints (snapshot, override, then restore
        and discard).
      required: false
      selector:
        boolean:

list_snapshots:
  name: List Device Snapshots
  description: >
    List the names of the snapshots saved for a device. Identify the
    device with either entity_id or ieee_address (exactly one). Returns
    the snapshot names, sorted.
  fields:
    entity_id:
      name: Device Entity
      description: >
        Any entity belonging to the device. Provide this or ieee_address,
        not both.
      required: false
      selector:
        entity:
          integration: control4_dimmers
    ieee_address:
      name: IEEE Address
      description: >
        The device's Zigbee IEEE address. Provide this or entity_id, not
        both.
      required: false
      selector:
        text:

delete_snapshot:
  name: Delete Device Snapshot
  description: >
    Remove a named snapshot from a device. Identify the device with
    either entity_id or ieee_address (exactly one). Returns deleted:
    false if no snapshot with that name existed.
  fields:
    entity_id:
      name: Device Entity
      description: >
        Any entity belonging to the device. Provide this or ieee_address,
        not both.
      required: false
      selector:
        entity:
          integration: control4_dimmers
    ieee_address:
      name: IEEE Address
      description: >
        The device's Zigbee IEEE address. Provide this or entity_id, not
        both.
      required: false
      selector:
        text:
    name:
      name: Snapshot Name
      description: The name of the snapshot to delete.
      required: true
      selector:
        text:

set_slot_led:
  name: Set Slot LED Mode and Colors
  description: >
    Set the LED mode and/or colors for a single button slot. Any
    field you omit keeps its current value, so you can call this with
    just `led_mode` to switch behavior without disturbing the colors,
    or with just colors to recolor without changing the mode.

    Color semantics depend on the mode:
      - fixed: `off_color` drives the displayed color (the chassis
        editor's single "Color" picker)
      - push_release: `on_color` flashes on press, `off_color` shows at rest
      - follow_load: `on_color` shows when the load is on,
        `off_color` shows when off
  fields:
    entity_id:
      name: Button Entity
      description: The event entity for the button.
      required: true
      selector:
        entity:
          domain: event
    led_mode:
      name: LED Mode
      description: One of fixed, follow_load, push_release.
      required: false
      selector:
        select:
          options:
            - fixed
            - follow_load
            - push_release
    on_color:
      name: On / Press / Load-On Color
      description: Hex RGB (e.g. "#ff0000" or "ff0000").
      required: false
      selector:
        text:
    off_color:
      name: Off / Release / Load-Off Color
      description: Hex RGB (e.g. "#000000" or "000000").
      required: false
      selector:
        text:

set_led:
  name: Set LED Color
  description: Set an LED color on a Control4 button.
  fields:
    entity_id:
      name: Button Entity
      description: The event entity for the button.
      required: true
      selector:
        entity:
          domain: event
    mode:
      name: Mode
      description: Which LED state to set (on or off).
      required: true
      selector:
        select:
          options:
            - "on"
            - "off"
    color:
      name: Color
      description: Hex RGB color (e.g. "#ff0000").
      required: true
      selector:
        text:

press_button:
  name: Press Button
  description: Simulate a button press on a Control4 device.
  fields:
    entity_id:
      name: Button Entity
      description: The event entity for the button.
      required: true
      selector:
        entity:
          domain: event
    event_type:
      name: Event Type
      description: The type of button event to simulate.
      required: false
      default: "pressed"
      selector:
        select:
          options:
            - "pressed"
            - "single_tap"
            - "double_tap"
            - "triple_tap"
            - "hold"

send_raw_command:
  name: Send Raw c4_cmd
  description: >
    Send an arbitrary c4_cmd string to a Control4 device.  Intended for
    protocol experimentation from Developer Tools, not normal use.  The
    command string is forwarded verbatim to Z2M and onto the device's
    proprietary text protocol.
  fields:
    entity_id:
      name: Device Sensor
      description: The sensor anchor entity for the target device.
      required: true
      selector:
        entity:
          domain: sensor
    command:
      name: Command
      description: 'Raw c4_cmd string (e.g. "c4.dmx.led 04 05 ffffff").'
      required: true
      selector:
        text:

set_device_type:
  name: Set Device Type
  description: Override the auto-detected device type.
  fields:
    entity_id:
      name: Device Sensor
      description: The sensor anchor entity for the device.
      required: true
      selector:
        entity:
          domain: sensor
    device_type:
      name: Device Type
      description: The device type to set.
      required: true
      selector:
        select:
          options:
            - "dimmer"
            - "keypaddim"
            - "keypad"
