name: Z2M Converter Tests

on:
  push:
    paths:
      - 'z2m/converters/**'
      - 'z2m/tests/**'
      - 'z2m/package.json'
  pull_request:
    paths:
      - 'z2m/converters/**'
      - 'z2m/tests/**'
      - 'z2m/package.json'

jobs:
  test:
    name: Run converter tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
        working-directory: z2m

      - name: Run tests
        run: npm test
        working-directory: z2m
