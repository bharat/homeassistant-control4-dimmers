name: Z2M Converter Tests

on:
  push:
    paths:
      - 'z2m/converters/**'
      - 'z2m/tests/**'
      - 'z2m/package.json'
  pull_request:
    paths:
      - 'z2m/converters/**'
      - 'z2m/tests/**'
      - 'z2m/package.json'

jobs:
  test:
    name: Run converter tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: z2m

      - name: Run tests
        run: npm test
        working-directory: z2m
