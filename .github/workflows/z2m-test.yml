name: Z2M Converter Tests

on:
  push:
    paths:
      - 'z2m/converters/**'
      - 'z2m/tests/**'
      - 'z2m/package.json'
  pull_request:
    paths:
      - 'z2m/converters/**'
      - 'z2m/tests/**'
      - 'z2m/package.json'

jobs:
  test:
    name: Run converter tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
        working-directory: z2m

      - name: Run tests
        run: npm test
        working-directory: z2m
