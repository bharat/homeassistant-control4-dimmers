name: Z2M Docker Image

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    paths:
      - 'z2m/converters/**'
      - 'z2m/Dockerfile'
      - 'z2m/entrypoint.sh'
      - '.github/workflows/z2m-docker.yml'
  pull_request:
    paths:
      - 'z2m/converters/**'
      - 'z2m/Dockerfile'
      - 'z2m/entrypoint.sh'
  release:
    types: [published]
  # Weekly rebuild so the published image tracks the upstream z2m base
  # instead of pinning whatever koenkk/zigbee2mqtt:latest was at the last
  # converter commit (issue #104: prod sat on a February base for months).
  schedule:
    - cron: '26 5 * * 2'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/zigbee2mqtt-control4

jobs:
  test:
    name: Run converter tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
        working-directory: z2m

      - name: Run tests
        run: npm test
        working-directory: z2m

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # The raw latest tag makes :latest track main. Without it, latest is
          # only minted on release events and freezes there (issue #121: prod
          # pulled a May image with an older z2m base as a result).
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: z2m
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
