# Docker Compose for Zigbee2MQTT with Control4 support
#
# Usage:
#   cp z2m/.env.example z2m/.env   # edit with your settings
#   docker compose -f z2m/docker-compose.yml up -d
#
# This is a drop-in replacement for the stock Z2M docker-compose.
#
# NOTE: this file uses build: for local development. Production consumes
# the published image instead (ghcr.io/bharat/zigbee2mqtt-control4:latest);
# there, a plain `docker compose pull && up -d` delivers z2m, the herdsman
# profile patch, and the converter together (the entrypoint wrapper installs
# the converter into the data dir at boot, surviving the bind mount).
# On z2m >= 2.11 pin `enable_external_js: true` in configuration.yaml.

services:
  zigbee2mqtt:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zigbee2mqtt
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Los_Angeles}
    volumes:
      - ${Z2M_DATA_DIR:-.}/data:/app/data
    ports:
      - "8080:8080"
    devices:
      - ${ZIGBEE_DEVICE:-/dev/ttyUSB0}:/dev/ttyACM0
